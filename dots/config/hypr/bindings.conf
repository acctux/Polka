# Application bindings
$terminal = uwsm app -- alacritty 
$browser = brave --password-store=gnome-libsecret --ozone-platform=wayland --ozone-platform-hint=wayland --enable-features=UseOzonePlatform
$fileManager = nemo

$mainMod = SUPER
$shiftMod = SUPER SHIFT

# App Launch Bindings
bind = $mainMod, M, exec, uwsm stop
bindd = $mainMod, Return, Terminal, exec, $terminal
bindd = $mainMod, E, File Manager, exec, $fileManager
bindd = $mainMod, B, Browser, exec, $browser
bindd = $mainMod, T, Neovim, exec, $terminal -e nvim
bindd = $mainMod, R, App Launcher, exec, fuzzel

bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Increase display zoom
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Decrease display zoom
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 # Reset display zoom

# Windows
bind = $mainMod, Q, killactive                                                              # Kill active window
bind = $mainMod, J, togglesplit                                                             # Toggle split
bindm = SHIFT, mouse:273, movewindow                                                     # Move window with the mouse
bindm = SHIFT, mouse:272, resizewindow                                                   # Resize window with the mouse
bind = $mainMod, G, togglegroup                                                             # Toggle window group
bind = $mainMod, K, swapsplit                                                               # Swapsplit
binde = ALT,Tab,cyclenext                                                                   # Cycle between windows
binde = ALT,Tab,bringactivetotop                                                            # Bring active window to the top

# Workspaces
bind = $mainMod, 1, workspace, 1  # Open workspace 1
bind = $mainMod, 2, workspace, 2  # Open workspace 2
bind = $mainMod, 3, workspace, 3  # Open workspace 3
bind = $mainMod, 4, workspace, 4  # Open workspace 4

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1  # Move active window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2  # Move active window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3  # Move active window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4  # Move active window to workspace 4

bind = $mainMod, Tab, workspace, m+1       # Open next workspace
bind = $mainMod SHIFT, Tab, workspace, m-1 # Open previous workspace
bind = $mainMod, mouse_down, workspace, e+1  # Open next workspace
bind = $mainMod, mouse_up, workspace, e-1    # Open previous workspace
bind = $mainMod CTRL, down, workspace, empty # Open the next empty workspace

# Fn keys
bindle = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioPlay, exec, playerctl play-pause                                                                                                           # Audio play pause
bind = , XF86AudioPause, exec, playerctl pause                                                                                                               # Audio pause
bind = , XF86AudioNext, exec, playerctl next                                                                                                                 # Audio next
bind = , XF86AudioPrev, exec, playerctl previous                                                                                                             # Audio previous
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle                                                                               # Toggle microphone
bind = , XF86Lock, exec, hyprlock                                                                                                                            # Open screenlock
bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +5 --max-volume 100
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -5 --max-volume 100
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle                                                                                      # Toggle mute
# Caps Lock (no backend, or with specific LED)
bind = , Caps_Lock, exec, swayosd-client --caps-lock                           # Caps Lock toggle

# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot -m window
# Screenshot a monitor
bind = , PRINT, exec, hyprshot -m output
# Screenshot a region
bind = $shiftMod, PRINT, exec, hyprshot -m region

bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-
