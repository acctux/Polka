source = input.conf
source = window.conf
source = looknfeel.conf

misc {
  disable_hyprland_logo = true
  disable_splash_rendering  = true
  focus_on_activate = true
}

monitor =,1920x1080@144,auto,1
exec-once = gsettings set org.gnome.desktop.interface icon-theme "WhiteSur-dark"
exec-once = gsettings set org.cinnamon.desktop.default-applications.terminal exec "alacritty"
exec-once = gsettings set org.cinnamon.desktop.default-applications.terminal exec-arg "-e"

ecosystem {
  no_update_news = true
}

xwayland {
  force_zero_scaling = true
}

cursor {
    no_hardware_cursors = true
}
