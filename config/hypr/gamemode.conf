monitor =,1920x1080@144,auto,1
xwayland {
  force_zero_scaling = true
}
cursor {
    no_hardware_cursors = true
}
general {
  gaps_in = 0
  gaps_out = 0
  border_size = 1
  col.active_border = rgba(33ccffee)
  col.inactive_border = rgba(595959aa)
  allow_tearing = true
  resize_on_border = false
  layout = master        # Keeps main window large for games
}
decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}
animations {
    enabled = false  # Disable all animations for performance
}
dwindle {
    pseudotile = false
    preserve_split = false
}
master {
    new_status = master
}
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    animate_manual_resizes = false
    enable_swallow = false
}
windowrule {
  name = xwayland
  match:xwayland = True
  no_blur = on
}
##################################################
# INPUT SETTINGS
##################################################
input {
  kb_layout = us,ru,ua
  numlock_by_default = true
  resolve_binds_by_sym = 1
  follow_mouse = 1
  sensitivity = 0.3
  touchpad {
    natural_scroll = false
  }
}
device {
  name = logitech-mx-master-3s
  sensitivity = -1
}
bindd = ALT, SPACE, Language switch, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next && pkill -RTMIN+6 waybar
$mainMod = SUPER
$shiftMod = SUPER SHIFT
binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop
bind = $mainMod, G, togglefloating
bind = $mainMod, D, togglesplit
bind = $shiftMod, D, pseudo
bind = $mainMod, F, fullscreen
bind = SHIFT, ESCAPE, killactive
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $shiftMod, 1, movetoworkspacesilent, 1
bind = $shiftMod, 2, movetoworkspacesilent, 2
bind = $shiftMod, 3, movetoworkspacesilent, 3
bind = $shiftMod, 4, movetoworkspacesilent, 4
bind = $mainMod, Tab, workspace, m+1
bind = $mainMod SHIFT, Tab, workspace, m-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod CTRL, down, workspace, empty
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +5 --max-volume 100
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -5 --max-volume 100
bindle = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise --device amdgpu_bl1
bindle = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower --device amdgpu_bl1
bind = , XF86Lock, exec, hyprlock
bind = , Caps_Lock, exec, swayosd-client --caps-lock
bind = , Num_Lock, exec, swayosd-client --num-lock
bind = , Scroll_Lock, exec, swayosd-client --scroll-lock
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = , PRINT, exec, hyprshot -m output
bind = $shiftMod, PRINT, exec, hyprshot -m region
bind = $mainMod, Z, exec, /home/nick/.local/bin/ocr/maim.sh
