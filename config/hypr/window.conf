layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = blur, waybar
layerrule = blur, fuzzel
layerrule = blur, walker

layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorezero, waybar
layerrule = ignorezero, fuzzel
layerrule = ignorezero, walker

layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window
layerrule = ignorealpha 0.5, waybar
layerrule = ignorealpha 0.5, fuzzel
layerrule = ignorealpha 0.5, walker
windowrule = noblur, xwayland:1

# Pavucontrol floating
windowrule = float,class:(.*org.pulseaudio.pavucontrol.*)
windowrule = size 700 600,class:(.*org.pulseaudio.pavucontrol.*)
windowrule = center,class:(.*org.pulseaudio.pavucontrol.*)
windowrule = pin,class:(.*org.pulseaudio.pavucontrol.*)

# Blueman Manager
windowrule = float,class:(blueman-manager)
windowrule = size 800 600,class:(blueman-manager)
windowrule = center,class:(blueman-manager)

# imv
windowrule = float,class:(imv)
windowrule = size 1000 800,class:(imv)
windowrule = pin,class:(imv)

# qjournalctl
windowrule = float,class:(qjournalctl)
windowrule = size 1000 800,class:(qjournalctl)

# nwg-look
windowrule = float,class:(nwg-look)
windowrule = size 700 600,class:(nwg-look)
windowrule = move 10% 20%,class:(nwg-look)

# xdg-desktop-portal-gtk
windowrule = float, class:xdg-desktop-portal-gtk, title:^(Open.*Files?|Save.*Files?|All Files|Save)
windowrule = center, class:xdg-desktop-portal-gtk, title:^(Open.*Files?|Save.*Files?|All Files|Save)

# Match anything that ends with "wants to save"
windowrulev2 = float, title:.*wants to save$
windowrulev2 = center, title:.*wants to save$

### 🔒 Float & Center Authentication / Polkit Dialogs
windowrulev2 = float, title:^(Authentication Required|Unlock Keyring|Login|qt-sudo)$
windowrulev2 = center, title:^(Authentication Required|Unlock Keyring|Login|qt-sudo)$

### Opacity Overrides
windowrulev2 = opacity 1.0 override 1.0 override, class:^(mpv)$
windowrulev2 = opacity 1.0 override 1.0 override, title:.*YouTube.*
windowrulev2 = opacity 1.0 override 1.0 override, title:.*FlickyStream.*

### 📋 nwg-clipman (Clipboard Manager)
windowrule = float, class:nwg-clipman
windowrule = center, class:nwg-clipman
windowrule = nofocus, class:nwg-clipman

### ⚙️ qt6ct (Qt6 Configuration Tool)
windowrulev2 = float, class:^(qt6ct)$
windowrulev2 = center, class:^(qt6ct)$

### 🔊 Audio Device Chooser / Panel
windowrulev2 = float, title:^(Audio Devices|Sound Settings|Select Audio Device|Output Devices|Volume Control)$
windowrulev2 = center, title:^(Audio Devices|Sound Settings|Select Audio Device|Volume Control)$

### 🔊 Audio Device Chooser / Panel
windowrulev2 = float,class:^(gsimplecal)$
windowrulev2 = move 1692 25,class:^(gsimplecal)$

