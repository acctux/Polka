windowrule = match:title .*YouTube.*, opacity 1.0 override 1.0 override
windowrule = match:title .*Concept Videos.*, opacity 1.0 override 1.0 override
windowrule = match:title .*FlickyStream.*, opacity 1.0 override 1.0 override
