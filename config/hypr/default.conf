exec-once = gsettings set org.gnome.desktop.interface icon-theme "WhiteSur-dark"
exec-once = gsettings set org.cinnamon.desktop.default-applications.terminal exec "alacritty"
exec-once = gsettings set org.cinnamon.desktop.default-applications.terminal exec-arg "-e"
ecosystem {
  no_update_news = true
  no_donation_nag = true
}
xwayland {
  force_zero_scaling = true
}
cursor {
    no_hardware_cursors = true
}
# Looknfeel
monitor =,1920x1080@144,auto,1
general {
  gaps_in = 2
  gaps_out = 0
  border_size = 1
  col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgba(30,58,138,1.0)
  resize_on_border = true
  # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 10
  active_opacity = 0.95
  inactive_opacity = 0.7
  fullscreen_opacity = 1.0
  blur {
    enabled = true
    size = 2
    passes = 2
    ignore_opacity = true
  }
  shadow {
    enabled = true
    range = 2
    render_power = 2
    color = rgba(8, 8, 10, 1)
  }
}

animations {
    enabled = true
    # Animation curves
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration
    # Animation configs
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    # animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
    # animation = workspaces, 1, 2.5, softAcDecel, slide
    # animation = workspaces, 1, 7, menu_decel, slidefade 15%
    # animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 15%
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # You probably want this
  force_split = 2 # Always split on the right
}
gesture = 3, horizontal, workspace

binds {
  allow_workspace_cycles = true
}
# master {
#   new_status = master
# }
##################################################
# INPUT SETTINGS
##################################################
input {
  kb_layout = us,ru,ua
  numlock_by_default = true
  resolve_binds_by_sym = 1
  follow_mouse = 1
  sensitivity = 0.3
  touchpad {
    natural_scroll = false
  }
}

##################################################
# DEVICE SETTINGS
##################################################
device {
  name = logitech-mx-master-3s
  sensitivity = -1
}

##################################################
# SWITCH KEYBOARD
###################################################
bindd = ALT, SPACE, Language switch, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next && pkill -RTMIN+6 waybar

##################################################
# MODIFIERS
##################################################
$mainMod = SUPER
$shiftMod = SUPER SHIFT

##################################################
# DEFAULT APPS
##################################################
$terminal = uwsm app -- alacritty -e
$browser = __NV_PRIME_RENDER_OFFLOAD=0 LIBVA_DRIVER_NAME=radeonsi MOZ_ENABLE_WAYLAND=1 firedragon
$fileManager = nemo

##################################################
# APP LAUNCH BINDINGS
##################################################
bind = $mainMod, M, exec, uwsm stop
bind = $mainMod, Return, exec, alacritty
bind = $shiftMod, Return, exec, /home/nick/.local/bin/fuzzel/mymenu.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, T, exec, $terminal nvim
bind = $shiftMod, T, exec, /home/nick/.local/bin/fuzzel/vpnmenu.sh
bind = $mainMod, R, exec, fuzzel
bind = $shiftMod, R, exec, killall -SIGUSR1 waybar

##################################################
# MOUSE WINDOW CONTROL
##################################################
bindm = SHIFT, mouse:273, movewindow
bindm = SHIFT, mouse:272, resizewindow

##################################################
# WINDOW FOCUS AND SWITCHING
##################################################
binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop
bind = $mainMod, G, togglefloating
bind = $mainMod, D, togglesplit
bind = $shiftMod, D, pseudo
bind = $mainMod, F, fullscreen
bind = SHIFT, ESCAPE, killactive

##################################################
# WORKSPACES
##################################################
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $shiftMod, 1, movetoworkspacesilent, 1
bind = $shiftMod, 2, movetoworkspacesilent, 2
bind = $shiftMod, 3, movetoworkspacesilent, 3
bind = $shiftMod, 4, movetoworkspacesilent, 4
bind = $mainMod, Tab, workspace, m+1
bind = $mainMod SHIFT, Tab, workspace, m-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod CTRL, down, workspace, empty

##################################################
# FUNCTION KEYS
##################################################
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +5 --max-volume 100
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -5 --max-volume 100
# brightnessctl -l to list devices
bindle = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise --device amdgpu_bl1
bindle = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower --device amdgpu_bl1
bind = , XF86Lock, exec, hyprlock
bind = , Caps_Lock, exec, swayosd-client --caps-lock
bind = , Num_Lock, exec, swayosd-client --num-lock
bind = , Scroll_Lock, exec, swayosd-client --scroll-lock

##################################################
# SCREENSHOTS
##################################################
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = , PRINT, exec, hyprshot -m output
bind = $shiftMod, PRINT, exec, hyprshot -m region
bind = $mainMod, Z, exec, /home/nick/.local/bin/ocr/maim.sh
layerrule {
  name = swaync-control-center
  match:class = swaync-control-center
  blur_popups = on
  blur = on
  ignore_alpha = 0.5
}
layerrule {
  name = swaync-notification-window
  match:class = swaync-notification-window
  blur_popups = on
  blur = on
  ignore_alpha = 0.5
}
layerrule {
  name = waybar
  match:class = waybar
  blur = on
  blur_popups = on
  ignore_alpha = 0.5
}
layerrule {
  name = fuzzel
  match:class = fuzzel
  blur_popups = on
  blur = on
  ignore_alpha = 0.5
}
windowrule {
  name = pavu
  match:class = (.*org.pulseaudio.pavucontrol.*)
  float = on
  size = 700 600
}
windowrule {
  name = imv
  match:class = imv
  float = on
  size = 1000 800
}
windowrule {
  name = qjournalctl
  match:class = qjournalctl
  float = on
  size = 1000 800
}
windowrule {
  name = nwg-clipman
  match:class = nwg-clipman
  float = on
  center = on
}
windowrule {
  name = simplecal
  match:class = ^(gsimplecal)$
  move = 1686 25
  float = on
}
windowrule {
  name = save
  match:title = ^(Authentication Required|Unlock Keyring|Login|qt-sudo)$
  float = on
  center = on
}
windowrule {
  name = save
  match:title = .*wants to save$
  float = on
  center = on
}
windowrule {
  name = xdg-desktop-portal-gtk
  match:class = xdg-desktop-portal-gtk
  float = on
  center = on
}
windowrule {
  name = xwayland
  match:xwayland = True
  no_blur = on
}
