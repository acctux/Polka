session_name: music
window_management: vertical
shell_command_before:
  - "systemctl --user is-active --quiet mpd.service || systemctl --user start mpd.service"
  - "systemctl --user is-active --quiet mpd-mpris.service || systemctl --user start mpd-mpris.service"
windows:
  - window_name: Rmpc
    layout: main-vertical # This ensures the layout is vertical (split vertically)
    panes:
      - shell_command:
          - rmpc
      - shell_command:
          - cava
        width: 25% # The second pane takes up 25% of the window's width
    focus: 0
